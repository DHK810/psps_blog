        <h1>🎵 노래 찾기</h1>

        <h3>노래 찾기</h3>
        <p>곡 이름이나 아티스트로 검색하면 코드 진행, 키, 카포 위치를 바로 확인할 수 있습니다. 코드 버튼을 누르면 운지법도 볼 수 있어요.</p>

        <div class="song-search-bar">
            <input type="text" id="songSearchInput" placeholder="곡 이름 또는 아티스트 검색 (예: 벚꽃, Ed Sheeran...)" autocomplete="off" />
        </div>

        <div class="song-filter-tags" id="songFilterTags">
            <button class="filter-tag active" data-filter="all">전체</button>
            <button class="filter-tag" data-filter="ko">한국어</button>
            <button class="filter-tag" data-filter="en">영어</button>
            <button class="filter-tag" data-filter="초급">초급</button>

            <button class="filter-tag" data-filter="중급">중급</button>

        <div class="song-grid" id="songGrid"></div>

        <!-- 코드 팝업 영역 (노래에서 코드 클릭 시 표시) -->

            <div class="chord-display">
                <div class="chord-name" id="chordName">코드를 선택하세요</div>

                        <span>G</span>

                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="nut" id="nutRow">
                        <span></span>
                        <div class="nut-bar"></div>
                    </div>
                    <div id="fretboardGrid"></div>
                </div>
                <div class="chord-info" id="chordInfo" style="display: none;">
                    <h4>운지법 안내</h4>
                    <div class="finger-guide" id="fingerGuide"></div>
                </div>
            </div>
        </div>
    </div>
    </div>

            },

                lang: 'ko', genre: '인디록',

                tip: 'B와 C#m 바레 코드 포함. 록 느낌의 업스트로킹이 잘 어울림.'
            },
            {
                title: '사랑을 했다', artist: 'IKON', year: 2018,
                lang: 'ko', genre: 'K팝',
                key: 'G장조', capo: 0, progression: ['G','Em','C','D'],
                bpm: 100, difficulty: '초급', range: 'D4 ~ D5',
                tip: '깔끔한 4코드 반복. 스트로킹 패턴 익히기 좋은 곡.'
            },
            {
                title: '너에게', artist: '015B / 강산에', year: 1990,
                lang: 'ko', genre: '발라드',
                key: 'G장조', capo: 0, progression: ['G','C','D','Em'],
                bpm: 72, difficulty: '초급', range: 'D4 ~ E5',
                tip: '클래식 발라드 4코드. 느린 속도로 코드 전환 연습에 최적.'
            },
            {
                title: '동치미', artist: '멜로망스', year: 2015,
                lang: 'ko', genre: '발라드',
                key: 'G장조', capo: 2, progression: ['G','D','Em','C'],
                bpm: 68, difficulty: '초중급', range: 'G3 ~ F5',
                tip: 'Capo 2. 보컬 음역이 넓어 카포 조절 필요. 핑거피킹 버전도 아름다움.'
            },
        ];

        let songFilterLang = 'all';
        let songFilterDiff = 'all';
        let songSearchQuery = '';

        function renderSongGrid() {
            const grid = document.getElementById('songGrid');
            if (!grid) return;

            const q = songSearchQuery.toLowerCase();
            const filtered = songDB.filter(s => {
                const matchLang = songFilterLang === 'all' || s.lang === songFilterLang;
                const matchDiff = songFilterDiff === 'all' || s.difficulty === songFilterDiff;
                const matchQ = !q || s.title.toLowerCase().includes(q) ||
                               s.artist.toLowerCase().includes(q) ||
                               (s.genre && s.genre.toLowerCase().includes(q));
                return matchLang && matchDiff && matchQ;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="song-no-result">검색 결과가 없습니다 🎸</div>`;
                return;
            }

            grid.innerHTML = filtered.map(s => {
                const capoText = s.capo > 0 ? `카포 ${s.capo}` : '카포 없음';
                const chordArrows = s.progression.map((c, i) =>
                    `<button class="song-chord-btn" onclick="loadSongChord('${c}')">${c}</button>` +
                    (i < s.progression.length - 1 ? `<span class="song-chord-arrow">→</span>` : '')
                ).join('');

                return `
                <div class="song-card">
                    <div class="song-card-header">
                        <div>
                            <div class="song-title">${s.title}</div>
                            <div class="song-artist">${s.artist} · ${s.year}</div>
                        </div>
                        <span class="song-difficulty diff-${s.difficulty}">${s.difficulty}</span>
                    </div>
                    <div class="song-meta">
                        <span class="song-meta-item"><b>키</b> ${s.key}</span>
                        <span class="song-meta-item"><b>카포</b> ${capoText}</span>
                        <span class="song-meta-item"><b>BPM</b> ${s.bpm}</span>
                        ${s.range ? `<span class="song-meta-item"><b>음역</b> ${s.range}</span>` : ''}
                    </div>
                    <div class="song-chords">${chordArrows}</div>
                    <div class="song-tip"><b>팁:</b> ${s.tip}</div>
                </div>`;
            }).join('');
        }

        function loadSongChord(chordName) {
            if (!chords[chordName]) return;
            renderFretboard(chordName);
            document.querySelectorAll('.chord-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.chord === chordName);
            });
            const section = document.getElementById('songChordSection');
            if (section) {
                section.style.display = 'block';
                section.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 필터 태그
        document.querySelectorAll('#songFilterTags .filter-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const f = tag.dataset.filter;
                if (['all','ko','en'].includes(f)) {
                    songFilterLang = f;
                    document.querySelectorAll('#songFilterTags .filter-tag').forEach(t => {
                        if (['all','ko','en'].includes(t.dataset.filter)) t.classList.remove('active');
                    });
                } else {
                    songFilterDiff = (songFilterDiff === f) ? 'all' : f;
                    document.querySelectorAll('#songFilterTags .filter-tag').forEach(t => {
                        if (!['all','ko','en'].includes(t.dataset.filter)) t.classList.remove('active');
                    });
                }
                tag.classList.toggle('active', true);
                if (['all','ko','en'].includes(f)) tag.classList.add('active');
                renderSongGrid();
            });
        });

        // 검색 입력
        const songInput = document.getElementById('songSearchInput');
        if (songInput) {
            songInput.addEventListener('input', () => {
                songSearchQuery = songInput.value;
                renderSongGrid();
            });
        }

        renderSongGrid();
    </script>
</body>
</html>
